openapi: 3.0.1
info:
  title: order-management
  version: "0.0"
paths:
  /customers:
    get:
      tags:
        - customers
      operationId: getCustomers
      responses:
        "200":
          description: getCustomers 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      tags:
        - customers
      operationId: createCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateDTO"
        required: true
      responses:
        "200":
          description: createCustomer 200 response
  /customers/{id}:
    get:
      tags:
        - customers
      operationId: getCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: getCustomer 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      tags:
        - customers
      operationId: updateCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateDTO"
        required: true
      responses:
        "200":
          description: updateCustomer 200 response
    delete:
      tags:
        - customers
      operationId: deleteCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: deleteCustomer 200 response
  /orders:
    get:
      tags:
        - orders
      operationId: getOrders
      responses:
        "200":
          description: getOrders 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Orders"
    post:
      tags:
        - orders
      operationId: createOrders
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrdersCreateDTO"
        required: true
      responses:
        "200":
          description: createOrders 200 response
  /orders/{id}:
    get:
      tags:
        - orders
      operationId: getOrders_1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: getOrders_1 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orders"
    put:
      tags:
        - orders
      operationId: updateOrders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrdersCreateDTO"
        required: true
      responses:
        "200":
          description: updateOrders 200 response
    delete:
      tags:
        - orders
      operationId: deleteOrders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: deleteOrders 200 response
  /orders/{id}/orderItems:
    get:
      tags:
        - orders
      operationId: getOrderItems
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: getOrderItems 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderItem"
components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        email:
          type: string
        firstName:
          type: string
        familyName:
          type: string
    CustomerCreateDTO:
      type: object
      properties:
        email:
          type: string
        firstName:
          type: string
        familyName:
          type: string
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
    Orders:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        dateCreated:
          type: string
          format: date
        address:
          type: string
        paid:
          type: boolean
        delivered:
          type: boolean
        totalAmount:
          type: number
    OrdersCreateDTO:
      type: object
      properties:
        address:
          type: string
        paid:
          type: boolean
        delivered:
          type: boolean
        customerId:
          type: integer
          format: int64
        orderItems:
          type: object
          additionalProperties:
            type: integer
            format: int32